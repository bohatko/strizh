name: app_template
description: "A reusable Flutter starter template with Supabase backend, Riverpod state management, and clean architecture for scalable apps."
publish_to: none
version: 1.0.0
environment:
  sdk: ^3.6.0
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  go_router: ^17.1.0
  connectivity_plus: ^6.1.5
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0
  supabase_flutter: ">=1.10.0"
  shared_preferences: ^2.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  riverpod_generator: ^4.0.0
  build_runner: ^2.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/flutter.jpg
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0B0F1A"
  image: assets/icons/flutter.jpg
  android_12:
    color: "#0B0F1A"
    image: assets/icons/flutter.jpg
